<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 1280px;
    height: 640px;
    overflow: hidden;
    font-family: "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", "Helvetica Neue", sans-serif;
    -webkit-font-smoothing: antialiased;
  }
  .card {
    width: 1280px;
    height: 640px;
    background:
      radial-gradient(circle at 85% 20%, rgba(251, 191, 36, 0.15) 0%, transparent 40%),
      radial-gradient(circle at 15% 80%, rgba(59, 130, 246, 0.2) 0%, transparent 45%),
      linear-gradient(135deg, #0B1E3F 0%, #0F2A5C 50%, #122E6B 100%);
    position: relative;
    padding: 70px 80px;
    color: #fff;
    overflow: hidden;
  }
  /* Decorative grid */
  .grid-bg {
    position: absolute;
    inset: 0;
    background-image:
      linear-gradient(rgba(255,255,255,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(255,255,255,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
  }
  /* Decorative blobs */
  .blob {
    position: absolute;
    border-radius: 50%;
    filter: blur(60px);
    opacity: 0.4;
  }
  .blob-1 { width: 300px; height: 300px; background: #3B82F6; top: -100px; right: -80px; }
  .blob-2 { width: 400px; height: 400px; background: #1E40AF; bottom: -150px; left: -100px; }

  .content { position: relative; z-index: 2; height: 100%; display: flex; flex-direction: column; justify-content: space-between; }

  /* Top ribbon */
  .ribbon {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    padding: 8px 18px;
    background: rgba(251, 191, 36, 0.12);
    border: 1px solid rgba(251, 191, 36, 0.4);
    border-radius: 100px;
    color: #FBBF24;
    font-size: 18px;
    font-weight: 500;
    letter-spacing: 0.5px;
    width: fit-content;
  }
  .ribbon .dot { width: 8px; height: 8px; border-radius: 50%; background: #FBBF24; box-shadow: 0 0 12px #FBBF24; }

  /* Title */
  h1 {
    font-size: 82px;
    font-weight: 800;
    line-height: 1.05;
    letter-spacing: -1px;
    margin-top: 22px;
    background: linear-gradient(135deg, #fff 0%, #DBEAFE 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  h1 .accent {
    background: linear-gradient(135deg, #FBBF24 0%, #F59E0B 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
  }
  .subtitle {
    font-size: 28px;
    font-weight: 400;
    color: #94A3B8;
    margin-top: 18px;
    letter-spacing: 2px;
  }

  /* Features grid */
  .features {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 20px;
    margin-top: 40px;
  }
  .feature {
    padding: 18px 22px;
    background: rgba(255, 255, 255, 0.06);
    border: 1px solid rgba(255, 255, 255, 0.1);
    border-radius: 14px;
    backdrop-filter: blur(10px);
  }
  .feature .icon { font-size: 26px; margin-bottom: 6px; }
  .feature .label { font-size: 20px; font-weight: 600; color: #fff; letter-spacing: 0.5px; }
  .feature .desc { font-size: 14px; color: #94A3B8; margin-top: 4px; }

  /* Bottom row */
  .bottom {
    display: flex;
    align-items: center;
    justify-content: space-between;
  }
  .tech-stack {
    display: flex;
    gap: 10px;
    flex-wrap: wrap;
  }
  .tech {
    padding: 8px 16px;
    background: rgba(255, 255, 255, 0.08);
    border: 1px solid rgba(255, 255, 255, 0.15);
    border-radius: 8px;
    font-size: 15px;
    font-weight: 500;
    color: #E2E8F0;
  }
  .tech.java { background: rgba(239, 68, 68, 0.15); border-color: rgba(239, 68, 68, 0.35); color: #FCA5A5; }
  .tech.vue { background: rgba(16, 185, 129, 0.15); border-color: rgba(16, 185, 129, 0.35); color: #6EE7B7; }
  .tech.spring { background: rgba(34, 197, 94, 0.15); border-color: rgba(34, 197, 94, 0.35); color: #86EFAC; }

  .brand {
    display: flex;
    align-items: center;
    gap: 12px;
    font-size: 16px;
    color: #64748B;
  }
  .brand .logo {
    width: 36px; height: 36px;
    background: linear-gradient(135deg, #FBBF24, #F59E0B);
    border-radius: 8px;
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
  }
  .brand strong { color: #E2E8F0; font-weight: 600; font-size: 17px; }
</style>
</head>
<body>
<div class="card">
  <div class="grid-bg"></div>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="content">
    <div>
      <div class="ribbon"><span class="dot"></span>企业级 · 信创适配 · 开箱即用 · 源代码</div>
      <h1>电子招投标<span class="accent">系统</span></h1>
      <div class="subtitle">全流程电子化招标采购平台解决方案</div>

      <div class="features">
        <div class="feature">
          <div class="icon">👥</div>
          <div class="label">四角色协同</div>
          <div class="desc">采购人 · 代理 · 供应商 · 专家</div>
        </div>
        <div class="feature">
          <div class="icon">🎥</div>
          <div class="label">远程开评标</div>
          <div class="desc">现场 / 远程 / 混合模式</div>
        </div>
        <div class="feature">
          <div class="icon">🔐</div>
          <div class="label">电子签章</div>
          <div class="desc">CA数字证书 · 国密加密</div>
        </div>
        <div class="feature">
          <div class="icon">⚖️</div>
          <div class="label">智能评审</div>
          <div class="desc">9阶段 · 自动生成报告</div>
        </div>
      </div>
    </div>

    <div class="bottom">
      <div class="tech-stack">
        <span class="tech spring">Spring Boot</span>
        <span class="tech java">Java</span>
        <span class="tech vue">Vue.js</span>
        <span class="tech">MySQL</span>
        <span class="tech">Redis</span>
        <span class="tech">MyBatis</span>
      </div>
      <div class="brand">
        <div class="logo">🏆</div>
        <div>
          <strong>E-Bidding Platform</strong><br>
          <span style="font-size:13px;">github.com/wzhnbb/bidding</span>
        </div>
      </div>
    </div>
  </div>
</div>
</body>
</html>
